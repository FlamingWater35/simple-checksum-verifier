name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            os_name: Windows
          - platform: ubuntu-22.04
            os_name: Linux

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev \
            libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev rpm

      - name: Install frontend dependencies
        run: npm install

      - name: Sync SvelteKit
        run: npx svelte-kit sync

      - name: Get version
        id: get_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Tauri App
        run: npm run tauri build

      - name: Package Windows Assets
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ver = "v${{ steps.get_version.outputs.VERSION }}"
          mkdir ./dist_assets

          # Detect Architecture
          $msiFile = Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi" | Select-Object -First 1
          if ($msiFile.Name -match "_(x64|x86|arm64)\.msi") { $arch = $Matches[1] } else { $arch = "x64" }

          $base = "Simple-Checksum-Verifier_${ver}_Windows_$arch"

          # 1. NSIS Installer
          $nsis = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          cp $nsis.FullName "./dist_assets/$base`_Setup.exe"

          # 2. Portable 7z
          $rawBinary = "src-tauri/target/release/simple-checksum-verifier.exe"
          $portableExe = "Simple-Checksum-Verifier.exe"
          cp $rawBinary "./$portableExe"
          7z a "./dist_assets/$base`_Portable.7z" "./$portableExe"

          # 3. MSI Installer
          cp $msiFile.FullName "./dist_assets/$base.msi"

      - name: Package Linux Assets
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          ver="v${{ steps.get_version.outputs.VERSION }}"
          mkdir ./dist_assets

          # Detect Architecture
          deb_path=$(ls src-tauri/target/release/bundle/deb/*.deb | head -n 1)
          raw_arch=$(basename "$deb_path" | cut -d'_' -f3 | cut -d'.' -f1)
          std_arch=$([ "$raw_arch" = "amd64" ] && echo "x86_64" || echo "$raw_arch")

          # 1. Binary
          cp src-tauri/target/release/simple-checksum-verifier "./dist_assets/simple-checksum-verifier_${ver}_linux_${std_arch}"

          # 2. AppImage
          cp src-tauri/target/release/bundle/appimage/*.AppImage "./dist_assets/Simple-Checksum-Verifier_${ver}_${std_arch}.AppImage"

          # 3. Debian Package
          cp "$deb_path" "./dist_assets/Simple-Checksum-Verifier_${ver}_${raw_arch}.deb"

          # 4. RPM Package
          cp src-tauri/target/release/bundle/rpm/*.rpm "./dist_assets/Simple-Checksum-Verifier_${ver}_${std_arch}.rpm"

      - name: Create or Update Draft Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true

          tag: v${{ steps.get_version.outputs.VERSION }}-${{ github.run_number }}
          name: "Version ${{ steps.get_version.outputs.VERSION }}"

          artifacts: "./dist_assets/*"
          draft: true
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
