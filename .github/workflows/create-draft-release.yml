name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            os_name: Windows
          - platform: ubuntu-22.04
            os_name: Linux

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev \
            libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev rpm

      - name: Install frontend dependencies
        run: npm install

      - name: Sync SvelteKit
        run: npx svelte-kit sync

      - name: Get version
        id: get_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Tauri App
        run: npm run tauri build

      - name: Package Windows Assets
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ver = "${{ steps.get_version.outputs.VERSION }}"
          mkdir ./dist_assets

          $bundledFile = Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi" | Select-Object -First 1
          if ($bundledFile.Name -match "_(x64|x86|arm64)\.msi") { $arch = $Matches[1] } else { $arch = "x64" }

          $base_name = "Simple-Checksum-Verifier_${ver}_Windows_$arch"

          $nsis = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          cp $nsis.FullName "./dist_assets/$base_name.exe"

          $rawBinary = "src-tauri/target/release/simple-checksum-verifier.exe"
          $portableName = "$base_name`_portable"
          cp $rawBinary "./$portableName.exe"
          7z a "./dist_assets/$portableName.7z" "./$portableName.exe"

          cp $bundledFile.FullName "./dist_assets/$base_name.msi"

      - name: Package Linux Assets
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          ver="${{ steps.get_version.outputs.VERSION }}"
          mkdir ./dist_assets

          deb_path=$(ls src-tauri/target/release/bundle/deb/*.deb | head -n 1)
          arch=$(basename "$deb_path" | cut -d'_' -f3 | cut -d'.' -f1)
          if [ -z "$arch" ]; then arch="amd64"; fi

          base_name="Simple-Checksum-Verifier_${ver}_Linux_$arch"

          cp src-tauri/target/release/simple-checksum-verifier "./dist_assets/$base_name"
          cp src-tauri/target/release/bundle/appimage/*.AppImage "./dist_assets/$base_name.AppImage"
          cp src-tauri/target/release/bundle/deb/*.deb "./dist_assets/$base_name.deb"
          cp src-tauri/target/release/bundle/rpm/*.rpm "./dist_assets/$base_name.rpm"

      - name: Create Draft Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}-${{ github.run_number }}
          name: "Version ${{ steps.get_version.outputs.VERSION }}"
          target_commitish: main
          draft: true
          prerelease: false
          files: ./dist_assets/*
